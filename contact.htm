<html lang="en-US">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- SEO description -->

    <!-- SEO keywords -->
    <meta name="keywords" content="Caiden Durham, contact">
    <title>Caiden Durham - Contact</title>
    <link rel="shortcut icon" href="images/siu.png" type="image/png">
    <!-- Shared styles -->
    <link rel="stylesheet" href="styles/main.css">
    <link rel="stylesheet" href="styles/slicknav.css">
</head>
<body>
<div class="page-wrap">
    <!-- Mobile nav container -->
    <div id="mobile-menu-container"></div>
    <!-- Primary navigation -->
    <nav id="menu" aria-label="Main navigation">
        <ul>
            <li><a href="index.htm">Home</a></li>
            <li><a href="interests.htm">Interests</a></li>
            <li><a href="work.htm">Work Experience</a></li>
            <li><a href="education.htm">Education</a></li>
            <li><a href="projects.htm">Projects</a></li>
            <li><a href="activities.htm">Activities</a></li>
            <li><a href="contact.htm">Contact</a></li>
        </ul>
    </nav>

    <!-- Main graphic with rollover effect -->
    <img id="mainGraphic" class="main-graphic" src="images/siu.png" alt="Main site graphic" onmouseover="swapMainGraphic(true)" onmouseout="swapMainGraphic(false)">

    <!-- Page headings -->
    <h1>Contact</h1>
    <h2>Let's Connect</h2>

    <!-- Intro text -->
    <p>Please complete the form below. All fields are required, and the message must be between 50 and 200 characters.</p>

    <!-- Contact form -->
    <form class="contact-form" action="response.htm" method="get">
        <label for="email">Email</label>
        <input id="email" name="email" type="email" required>

        <label for="password">Password</label>
        <input id="password" name="password" type="password" minlength="8" required>

        <label for="fullName">Full Name</label>
        <input id="fullName" name="fullName" type="text" pattern="[A-Za-z][A-Za-z\-\s']{1,}" title="Enter a full name using letters, spaces, apostrophes, or hyphens." required>

        <label for="address">Address</label>
        <input id="address" name="address" type="text" minlength="5" required>

        <label for="city">City</label>
        <input id="city" name="city" type="text" pattern="[A-Za-z][A-Za-z\-\s']{1,}" title="Enter a valid city name." required>

        <label for="state">State</label>
        <select id="state" name="state" required>
            <option value="" selected disabled>Select a state</option>
            <option value="AL">Alabama</option>
            <option value="AK">Alaska</option>
            <option value="AZ">Arizona</option>
            <option value="AR">Arkansas</option>
            <option value="CA">California</option>
            <option value="CO">Colorado</option>
            <option value="CT">Connecticut</option>
            <option value="DE">Delaware</option>
            <option value="FL">Florida</option>
            <option value="GA">Georgia</option>
            <option value="HI">Hawaii</option>
            <option value="ID">Idaho</option>
            <option value="IL">Illinois</option>
            <option value="IN">Indiana</option>
            <option value="IA">Iowa</option>
            <option value="KS">Kansas</option>
            <option value="KY">Kentucky</option>
            <option value="LA">Louisiana</option>
            <option value="ME">Maine</option>
            <option value="MD">Maryland</option>
            <option value="MA">Massachusetts</option>
            <option value="MI">Michigan</option>
            <option value="MN">Minnesota</option>
            <option value="MS">Mississippi</option>
            <option value="MO">Missouri</option>
            <option value="MT">Montana</option>
            <option value="NE">Nebraska</option>
            <option value="NV">Nevada</option>
            <option value="NH">New Hampshire</option>
            <option value="NJ">New Jersey</option>
            <option value="NM">New Mexico</option>
            <option value="NY">New York</option>
            <option value="NC">North Carolina</option>
            <option value="ND">North Dakota</option>
            <option value="OH">Ohio</option>
            <option value="OK">Oklahoma</option>
            <option value="OR">Oregon</option>
            <option value="PA">Pennsylvania</option>
            <option value="RI">Rhode Island</option>
            <option value="SC">South Carolina</option>
            <option value="SD">South Dakota</option>
            <option value="TN">Tennessee</option>
            <option value="TX">Texas</option>
            <option value="UT">Utah</option>
            <option value="VT">Vermont</option>
            <option value="VA">Virginia</option>
            <option value="WA">Washington</option>
            <option value="WV">West Virginia</option>
            <option value="WI">Wisconsin</option>
            <option value="WY">Wyoming</option>
        </select>

        <label for="zip">ZIP</label>
        <input id="zip" name="zip" type="text" inputmode="numeric" pattern="\d{5}(-\d{4})?" title="Enter ZIP as 12345 or 12345-6789." required>

        <label for="phone">Phone Number</label>
        <input id="phone" name="phone" type="tel" pattern="\d{3}-\d{3}-\d{4}" title="Enter phone as 555-555-5555." required>

        <label for="creationDate">Creation Date</label>
        <input id="creationDate" name="creationDate" type="date" min="1900-01-01" required>

        <label for="message">Message (50 to 200 characters)</label>
        <textarea id="message" name="message" rows="6" minlength="50" maxlength="200" required></textarea>

        <fieldset class="radio-group">
            <legend>Type of Inquiry</legend>
            <label><input type="radio" name="inquiryType" value="general" required> General Question</label>
            <label><input type="radio" name="inquiryType" value="project"> Project Request</label>
            <label><input type="radio" name="inquiryType" value="support"> Technical Support</label>
        </fieldset>

        <div class="form-actions">
            <input type="submit" value="Send">
            <input type="reset" value="Reset">
        </div>
    </form>
</div>

<!-- Shared scripts -->
<script src="js/jquery-3.7.1.min.js"></script>
<script src="js/jquery.slicknav.min.js"></script>
<script src="js/rollover.js"></script>
<script src="js/nav.js"></script>
</body>
</html>
